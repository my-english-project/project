<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UTS English Flashcards - Can/Can't</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap"
    rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            uts: {
              blue: '#1A237E',
              sky: '#42A5F5',
              gold: '#B4975A',
              green: '#4CAF50',
              red: '#D3220A',
              softRed: '#EF9A9A',
              light: '#F5F5F5'
            }
          },
          fontFamily: {
            display: ['Outfit', 'sans-serif'],
            body: ['Plus Jakarta Sans', 'sans-serif'],
          },
          animation: {
            'fade-in': 'fadeIn 0.5s ease-out forwards',
            'slide-up': 'slideUp 0.4s ease-out forwards',
            'bounce-subtle': 'bounceSubtle 2s infinite',
          },
          keyframes: {
            fadeIn: {
              '0%': { opacity: '0' },
              '100%': { opacity: '1' },
            },
            slideUp: {
              '0%': { transform: 'translateY(20px)', opacity: '0' },
              '100%': { transform: 'translateY(0)', opacity: '1' },
            },
            bounceSubtle: {
              '0%, 100%': { transform: 'translateY(0)' },
              '50%': { transform: 'translateY(-5px)' },
            }
          }
        }
      }
    }
  </script>
  <style>
    body {
      background-color: #F5F5F5;
      background-image: radial-gradient(#1A237E10 1px, transparent 1px);
      background-size: 30px 30px;
      font-family: 'Plus Jakarta Sans', sans-serif;
    }

    .glass {
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .card-shadow {
      box-shadow: 0 10px 25px -5px rgba(26, 35, 126, 0.1), 0 8px 10px -6px rgba(26, 35, 126, 0.1);
    }

    .progress-transition {
      transition: width 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .option-btn {
      transition: all 0.2s ease;
    }

    .option-btn:active {
      transform: scale(0.98);
    }

    .correct-pulse {
      animation: correctPulse 0.5s ease-in-out;
    }

    @keyframes correctPulse {
      0% {
        transform: scale(1);
      }

      50% {
        transform: scale(1.02);
        border-color: #4CAF50;
        box-shadow: 0 0 15px rgba(76, 175, 80, 0.3);
      }

      100% {
        transform: scale(1);
      }
    }

    .hidden {
      display: none;
    }
  </style>
</head>

<body class="min-h-screen text-slate-800 antialiased">

  <!-- Header -->
  <header class="sticky top-0 z-50 glass border-b border-slate-200 py-3 px-4 md:px-8 flex items-center justify-between">
    <div class="flex items-center gap-3">
      <a href="index.html" class="p-2 hover:bg-slate-100 rounded-full transition-colors">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-uts-blue" fill="none" viewBox="0 0 24 24"
          stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
        </svg>
      </a>
      <div
        class="h-8 w-24 rounded flex items-center justify-center text-[10px] font-bold text-uts-blue tracking-tighter uppercase px-2 text-center leading-none">
        <img src="../../assets/images/logo-uts-2024.png" alt="UTS Logo" class="logo">
      </div>
    </div>
    <h1 class="font-display font-bold text-lg md:text-xl text-uts-blue tracking-tight">Using Can/Can't Vol. 3</h1>
    <div class="w-10"></div> <!-- Spacer for balance -->
  </header>

  <main id="app" class="max-w-2xl mx-auto px-4 py-8 md:py-12">

    <!-- Game UI -->
    <div id="game-ui" class="space-y-6 animate-fade-in">
      <!-- Progress & Stats -->
      <div class="space-y-3">
        <div class="flex justify-between items-end px-1">
          <span class="text-xs font-bold text-uts-blue/60 uppercase tracking-widest" id="q-counter">Question 1/10</span>
          <span class="text-xs font-bold text-uts-green uppercase tracking-widest" id="score-counter">Score: 0</span>
        </div>
        <div class="h-2 w-full bg-slate-200 rounded-full overflow-hidden">
          <div id="progress-bar" class="h-full bg-uts-sky progress-transition" style="width: 10%;"></div>
        </div>
      </div>

      <!-- Flashcard -->
      <div id="card-element"
        class="bg-white rounded-3xl p-6 md:p-10 card-shadow border border-slate-100 relative overflow-hidden transition-all duration-300">
        <div id="q-type"
          class="inline-block px-3 py-1 rounded-full bg-uts-blue/5 text-uts-blue text-[10px] font-bold uppercase tracking-widest mb-4">
          Grammar Focus
        </div>

        <h2 id="q-text" class="font-display text-xl md:text-2xl font-semibold leading-snug mb-8">
          Loading your challenge...
        </h2>

        <div id="interaction-area" class="space-y-3 min-h-[160px]">
          <!-- Dynamic content injected here -->
        </div>

        <div id="feedback-area" class="mt-8 pt-6 border-t border-slate-50 hidden animate-slide-up">
          <div class="flex items-start gap-3">
            <div id="feedback-icon" class="mt-1"></div>
            <div>
              <p id="feedback-status" class="font-bold text-sm uppercase tracking-wide mb-1"></p>
              <p id="feedback-explanation" class="text-sm text-slate-600 leading-relaxed"></p>
            </div>
          </div>
        </div>
      </div>

      <!-- Controls -->
      <div class="flex flex-col gap-3">
        <button id="submit-btn"
          class="w-full bg-uts-blue hover:bg-uts-blue/90 text-white font-bold py-4 rounded-2xl shadow-lg shadow-uts-blue/20 transition-all transform active:scale-[0.98] flex items-center justify-center gap-2">
          Check Answer
        </button>
        <button id="next-btn"
          class="w-full bg-uts-sky hover:bg-uts-sky/90 text-white font-bold py-4 rounded-2xl shadow-lg shadow-uts-sky/20 transition-all transform active:scale-[0.98] hidden items-center justify-center gap-2">
          Next Question
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7l5 5m0 0l-5 5m5-5H6" />
          </svg>
        </button>
      </div>
    </div>

    <!-- Result Screen -->
    <div id="result-screen" class="hidden animate-slide-up text-center py-10 px-6 bg-white rounded-3xl card-shadow">
      <div class="mb-6 inline-flex items-center justify-center w-20 h-20 bg-uts-gold/10 rounded-full">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-uts-gold" fill="none" viewBox="0 0 24 24"
          stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-7.714 2.143L11 21l-2.286-6.857L1 12l7.714-2.143L11 3z" />
        </svg>
      </div>
      <h2 class="font-display text-3xl font-bold text-uts-blue mb-2">Well Done!</h2>
      <p class="text-slate-500 mb-8">You've completed the "Can / Can't" Module</p>

      <div class="bg-slate-50 rounded-2xl p-6 mb-8 inline-block min-w-[200px]">
        <span class="block text-xs uppercase tracking-widest font-bold text-slate-400 mb-1">Final Score</span>
        <span id="final-score" class="text-5xl font-display font-bold text-uts-blue">8/10</span>
      </div>

      <p id="performance-msg" class="text-lg text-slate-700 font-medium mb-10 italic">"Excellent command of intermediate
        modal verbs!"</p>

      <button onclick="resetQuiz()"
        class="w-full bg-uts-gold hover:bg-[#A38649] text-white font-bold py-4 rounded-2xl shadow-lg shadow-uts-gold/20 transition-all transform active:scale-[0.98]">
        Try Again
      </button>
    </div>

  </main>

  <script>
    const questions = [
      {
        type: "Deduction",
        prompt: "Look at those clouds! It ______ rain any minute now.",
        options: ["can", "can't", "can't not"],
        correct: "can",
        explanation: "We use 'can' to express a general possibility that something is possible based on circumstances."
      },
      {
        type: "Permission",
        prompt: "______ I use your phone for a quick call? Mine is dead.",
        options: ["Can", "Can't", "Do I can"],
        correct: "Can",
        explanation: "'Can' is frequently used in informal contexts to ask for permission."
      },
      {
        type: "Reorder",
        prompt: "Put the words in order: (play / can / really / she / well / guitar / the)",
        correct: "She can play the guitar really well",
        explanation: "The structure is Subject + can + verb (base form) + complement."
      },
      {
        type: "Grammar Check",
        prompt: "True or False: We use 'cans' for the third person singular (He/She/It).",
        options: ["True", "False"],
        correct: "False",
        explanation: "Modal verbs like 'can' never change form. They don't take an -s in the third person."
      },
      {
        type: "Request",
        prompt: "You want someone to open the window. What do you say?",
        options: ["Can you open the window?", "Can I open the window?", "You can open the window?"],
        correct: "Can you open the window?",
        explanation: "This is a polite request. 'Can you...' is a standard way to ask someone to do something."
      },
      {
        type: "Usage Identification",
        prompt: "In the sentence 'I can speak three languages,' what does 'can' express?",
        options: ["Permission", "Ability", "Possibility"],
        correct: "Ability",
        explanation: "'Can' is used here to show a learned skill or physical/mental ability."
      },
      {
        type: "Negative Ability",
        prompt: "I ______ find my keys anywhere! Have you seen them?",
        options: ["can", "can't", "cannot to"],
        correct: "can't",
        explanation: "We use 'can't' (cannot) to express an inability to do something at a specific moment."
      },
      {
        type: "General Possibility",
        prompt: "It ______ be very cold in Salamanca during the winter.",
        options: ["can", "can't", "is can"],
        correct: "can",
        explanation: "'Can' is used to describe things that are sometimes or often true (theoretical possibility)."
      },
      {
        type: "Error Correction",
        prompt: "Identify and fix the error: 'She can to swim very fast.'",
        correct: "She can swim very fast",
        explanation: "Modal verbs are followed by the base form of the verb without 'to'."
      },
      {
        type: "Fixed Phrase",
        prompt: "Which is correct? 'I ______ believe it! We won!'",
        options: ["can", "can't", "don't can"],
        correct: "can't",
        explanation: "'I can't believe it' is a common expression used to show surprise or shock."
      }
    ];

    let currentIdx = 0;
    let score = 0;
    let selectedOption = null;

    const qCounter = document.getElementById('q-counter');
    const scoreCounter = document.getElementById('score-counter');
    const progressBar = document.getElementById('progress-bar');
    const qTypeText = document.getElementById('q-type');
    const qText = document.getElementById('q-text');
    const interactionArea = document.getElementById('interaction-area');
    const feedbackArea = document.getElementById('feedback-area');
    const feedbackIcon = document.getElementById('feedback-icon');
    const feedbackStatus = document.getElementById('feedback-status');
    const feedbackExplanation = document.getElementById('feedback-explanation');
    const submitBtn = document.getElementById('submit-btn');
    const nextBtn = document.getElementById('next-btn');
    const gameUI = document.getElementById('game-ui');
    const resultScreen = document.getElementById('result-screen');
    const cardElement = document.getElementById('card-element');

    function initQuestion() {
      const q = questions[currentIdx];
      selectedOption = null;

      // Reset UI
      feedbackArea.classList.add('hidden');
      nextBtn.classList.add('hidden');
      submitBtn.classList.remove('hidden');
      cardElement.classList.remove('border-uts-green', 'bg-uts-green/5', 'border-uts-red', 'bg-uts-red/5');

      // Update Stats
      qCounter.innerText = `Question ${currentIdx + 1}/${questions.length}`;
      scoreCounter.innerText = `Score: ${score}`;
      progressBar.style.width = `${((currentIdx + 1) / questions.length) * 100}%`;

      // Update Card Content
      qTypeText.innerText = q.type;
      qText.innerText = q.prompt;

      interactionArea.innerHTML = '';

      if (q.options) {
        // Multiple Choice
        const grid = document.createElement('div');
        grid.className = 'grid grid-cols-1 gap-3';
        q.options.forEach(opt => {
          const btn = document.createElement('button');
          btn.className = 'option-btn w-full text-left p-4 rounded-xl border-2 border-slate-100 hover:border-uts-sky hover:bg-uts-sky/5 font-medium transition-all flex items-center justify-between group';
          btn.innerHTML = `
                        <span>${opt}</span>
                        <div class="w-5 h-5 rounded-full border-2 border-slate-200 group-hover:border-uts-sky transition-colors"></div>
                    `;
          btn.onclick = () => {
            document.querySelectorAll('.option-btn').forEach(b => {
              b.classList.remove('border-uts-sky', 'bg-uts-sky/5');
              b.querySelector('div').classList.remove('bg-uts-sky', 'border-uts-sky');
            });
            btn.classList.add('border-uts-sky', 'bg-uts-sky/5');
            btn.querySelector('div').classList.add('bg-uts-sky', 'border-uts-sky');
            selectedOption = opt;
          };
          grid.appendChild(btn);
        });
        interactionArea.appendChild(grid);
      } else {
        // Text Input
        const input = document.createElement('input');
        input.type = 'text';
        input.placeholder = 'Type your answer here...';
        input.id = 'text-answer';
        input.className = 'w-full p-4 rounded-xl border-2 border-slate-200 focus:border-uts-blue focus:ring-0 outline-none transition-all font-medium';
        interactionArea.appendChild(input);
      }
    }

    submitBtn.onclick = () => {
      const q = questions[currentIdx];
      let userAns = "";

      if (q.options) {
        if (!selectedOption) return alert("Please select an option!");
        userAns = selectedOption;
      } else {
        userAns = document.getElementById('text-answer').value.trim();
        if (!userAns) return alert("Please type an answer!");
      }

      const isCorrect = userAns.toLowerCase().replace(/[.,\/#!$%\^&\*;:{}=\-_`~()]/g, "") ===
        q.correct.toLowerCase().replace(/[.,\/#!$%\^&\*;:{}=\-_`~()]/g, "");

      // Show Feedback
      feedbackArea.classList.remove('hidden');
      submitBtn.classList.add('hidden');
      nextBtn.classList.remove('hidden');
      nextBtn.classList.add('flex');

      if (isCorrect) {
        score++;
        scoreCounter.innerText = `Score: ${score}`;
        cardElement.classList.add('border-uts-green', 'bg-uts-green/5', 'correct-pulse');
        feedbackStatus.innerText = "Excellent!";
        feedbackStatus.className = "font-bold text-sm uppercase tracking-wide mb-1 text-uts-green";
        feedbackIcon.innerHTML = `<div class="w-6 h-6 rounded-full bg-uts-green flex items-center justify-center text-white"><svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7" /></svg></div>`;
      } else {
        cardElement.classList.add('border-uts-red', 'bg-uts-red/5');
        feedbackStatus.innerText = "Not quite";
        feedbackStatus.className = "font-bold text-sm uppercase tracking-wide mb-1 text-uts-red";
        feedbackIcon.innerHTML = `<div class="w-6 h-6 rounded-full bg-uts-red flex items-center justify-center text-white"><svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12" /></svg></div>`;
      }

      feedbackExplanation.innerText = q.explanation;

      // Disable interactions
      if (q.options) {
        document.querySelectorAll('.option-btn').forEach(b => b.disabled = true);
      } else {
        document.getElementById('text-answer').disabled = true;
      }
    };

    nextBtn.onclick = () => {
      currentIdx++;
      if (currentIdx < questions.length) {
        initQuestion();
      } else {
        showResults();
      }
    };

    function showResults() {
      gameUI.classList.add('hidden');
      resultScreen.classList.remove('hidden');

      const finalScore = document.getElementById('final-score');
      finalScore.innerText = `${score}/${questions.length}`;

      const msg = document.getElementById('performance-msg');
      const ratio = score / questions.length;
      if (ratio === 1) msg.innerText = "Perfect! You're a 'can/can't' master!";
      else if (ratio >= 0.7) msg.innerText = "Great job! Your understanding is very strong.";
      else if (ratio >= 0.5) msg.innerText = "Good effort! Keep practicing those modal verbs.";
      else msg.innerText = "Keep studying! Review the usage rules and try again.";
    }

    function resetQuiz() {
      currentIdx = 0;
      score = 0;
      resultScreen.classList.add('hidden');
      gameUI.classList.remove('hidden');
      initQuestion();
    }

    // Start Application
    window.onload = initQuestion;
  </script>
</body>

</html>
