<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Interactive Flashcards | Wants, Likes & Preferences</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Plus+Jakarta+Sans:wght@400;500;700&display=swap"
    rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#1e3a8a', // Navy Blue
            secondary: '#3b82f6',
            accent: '#10b981',
            background: '#f8fafc',
            card: '#ffffff',
            success: '#28a745',
            error: '#ef4444',
            errorBg: '#fef2f2'
          },
          fontFamily: {
            display: ['Outfit', 'sans-serif'],
            body: ['Plus Jakarta Sans', 'sans-serif'],
          },
          animation: {
            'fade-in': 'fadeIn 0.5s ease-out forwards',
            'slide-up': 'slideUp 0.4s ease-out forwards',
            'bounce-subtle': 'bounceSubtle 2s infinite',
          },
          keyframes: {
            fadeIn: {
              '0%': { opacity: '0' },
              '100%': { opacity: '1' },
            },
            slideUp: {
              '0%': { transform: 'translateY(20px)', opacity: '0' },
              '100%': { transform: 'translateY(0)', opacity: '1' },
            },
            bounceSubtle: {
              '0%, 100%': { transform: 'translateY(0)' },
              '50%': { transform: 'translateY(-5px)' },
            }
          }
        }
      }
    }
  </script>
  <style>
    .glass-effect {
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.3);
    }

    .option-btn {
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .option-btn:active {
      transform: scale(0.98);
    }

    .drop-zone {
      min-height: 60px;
      transition: all 0.3s ease;
    }

    .word-chip {
      cursor: pointer;
      user-select: none;
      transition: all 0.2s ease;
    }

    .word-chip:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
    }

    .progress-fill {
      transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }

    body {
      background: radial-gradient(circle at top right, #e0f2fe, #f8fafc);
      min-height: 100vh;
    }
  </style>
</head>

<body class="font-body text-slate-800">

  <!-- Header Section -->
  <header class="sticky top-0 z-50 w-full px-4 py-4 md:px-8 glass-effect border-b border-slate-200">
    <div class="max-w-5xl mx-auto flex items-center justify-between">
      <a href="index.html" class="p-2 hover:bg-slate-100 rounded-full transition-colors group" aria-label="Go back">
        <svg xmlns="http://www.w3.org/2000/svg"
          class="w-6 h-6 text-slate-600 group-hover:text-primary transition-colors" fill="none" viewBox="0 0 24 24"
          stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
        </svg>
      </a>

      <div class="flex items-center gap-3">
        <div class="text-right hidden sm:block">
          <p class="text-xs font-bold uppercase tracking-wider text-slate-400">Universidad Tecnológica de Salamanca</p>
          <p class="text-lg font-display font-bold text-primary leading-tight">CELE</p>
        </div>
        <div class="h-10 w-20 rounded-lg flex items-center justify-center">
          <img src="../../assets/images/logo-uts-2024.png" alt="UTS Logo" class="logo">
        </div>
      </div>
    </div>
  </header>

  <main class="max-w-3xl mx-auto px-4 py-8 md:py-12">
    <!-- Title & Progress -->
    <div class="mb-8 text-center animate-fade-in">
      <h1 class="text-3xl md:text-4xl font-display font-bold text-slate-900 mb-2">Wants, Likes & Preferences Vol. 1</h1>
      <p class="text-slate-500 font-medium">Test your knowledge on common expressions</p>

      <div class="mt-8 relative pt-1">
        <div class="flex mb-2 items-center justify-between">
          <div>
            <span id="progress-text"
              class="text-xs font-semibold inline-block py-1 px-2 uppercase rounded-full text-primary bg-blue-100">
              Question 1 of 10
            </span>
          </div>
          <div class="text-right">
            <span id="percentage-text" class="text-xs font-semibold inline-block text-primary">
              10%
            </span>
          </div>
        </div>
        <div class="overflow-hidden h-2 mb-4 text-xs flex rounded-full bg-slate-200">
          <div id="progress-bar" style="width:10%"
            class="progress-fill shadow-none flex flex-col text-center whitespace-nowrap text-white justify-center bg-primary">
          </div>
        </div>
      </div>
    </div>

    <!-- Quiz Container -->
    <div id="quiz-container" class="relative">
      <!-- Game Area -->
      <div id="game-area"
        class="bg-white rounded-3xl shadow-xl shadow-slate-200/50 p-6 md:p-10 border border-slate-100 animate-slide-up">
        <div class="mb-6">
          <span id="question-number" class="text-primary font-bold text-sm uppercase tracking-widest">Question #1</span>
          <h2 id="question-text"
            class="text-xl md:text-2xl font-display font-semibold text-slate-800 mt-2 leading-tight">
            Loading question...
          </h2>
        </div>

        <!-- Interaction Area -->
        <div id="input-area" class="space-y-4 min-h-[200px] flex flex-col justify-center">
          <!-- Dynamic Content Injected Here -->
        </div>

        <!-- Feedback Area -->
        <div id="feedback-area" class="mt-8 hidden opacity-0 transition-opacity duration-300">
          <div id="feedback-content" class="p-4 rounded-2xl flex items-start gap-4">
            <div id="feedback-icon" class="mt-1"></div>
            <div>
              <p id="feedback-status" class="font-bold text-lg mb-1"></p>
              <p id="feedback-message" class="text-sm opacity-90"></p>
            </div>
          </div>
        </div>

        <!-- Controls -->
        <div class="mt-10 flex gap-4">
          <button id="check-btn" onclick="checkAnswer()"
            class="flex-1 bg-primary hover:bg-blue-800 text-white font-bold py-4 px-6 rounded-2xl shadow-lg shadow-blue-900/20 transition-all transform hover:-translate-y-1 active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed">
            Check Answer
          </button>
          <button id="next-btn" onclick="nextQuestion()"
            class="hidden flex-1 bg-accent hover:bg-emerald-600 text-white font-bold py-4 px-6 rounded-2xl shadow-lg shadow-emerald-900/20 transition-all transform hover:-translate-y-1 active:scale-95">
            Continue
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 inline-block ml-2" fill="none" viewBox="0 0 24 24"
              stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3" />
            </svg>
          </button>
        </div>
      </div>

      <!-- Results Area -->
      <div id="result-area"
        class="hidden bg-white rounded-3xl shadow-2xl p-10 text-center border border-slate-100 animate-slide-up">
        <div class="mb-6">
          <div
            class="w-24 h-24 bg-blue-50 text-primary rounded-full flex items-center justify-center mx-auto mb-6 text-4xl shadow-inner">
            🏆
          </div>
          <h2 class="text-3xl font-display font-bold text-slate-900 mb-2">Excellent Work!</h2>
          <p class="text-slate-500">You've completed the challenge.</p>
        </div>

        <div class="bg-slate-50 rounded-2xl p-8 mb-8 border border-slate-100">
          <p class="text-slate-400 font-bold uppercase text-xs tracking-widest mb-2">Final Score</p>
          <div id="final-score" class="text-6xl font-display font-black text-primary">0%</div>
          <p id="score-fraction" class="text-slate-500 mt-2 font-medium">0 out of 10 correct</p>
        </div>

        <button onclick="restartGame()"
          class="w-full bg-primary hover:bg-blue-800 text-white font-bold py-4 px-8 rounded-2xl shadow-xl shadow-blue-900/20 transition-all transform hover:-translate-y-1">
          Try Again
        </button>
      </div>
    </div>
  </main>

  <script>
    const questions = [
      {
        id: 1,
        type: 'mc',
        text: "Which of these is used to express a polite desire?",
        options: ["I want", "I would like", "I like", "I prefer"],
        answer: "I would like"
      },
      {
        id: 2,
        type: 'fill',
        text: "Complete the sentence: 'I _____ playing soccer on weekends.' (enjoy/hobby)",
        answer: "like"
      },
      {
        id: 3,
        type: 'unscramble',
        text: "Unscramble the preference sentence:",
        parts: ["tea", "I", "to", "prefer", "coffee"],
        answer: "I prefer tea to coffee"
      },
      {
        id: 4,
        type: 'mc',
        text: "If you have two options and choose one, you say: 'I ______ the red one.'",
        options: ["wanting", "prefer", "liking", "would"],
        answer: "prefer"
      },
      {
        id: 5,
        type: 'fill',
        text: "Complete: 'She _______ like to visit Japan next year.'",
        answer: "would"
      },
      {
        id: 6,
        type: 'unscramble',
        text: "Put the words in order for a question:",
        parts: ["you", "Would", "like", "water?", "some"],
        answer: "Would you like some water?"
      },
      {
        id: 7,
        type: 'mc',
        text: "What follows 'would like' when using a verb?",
        options: ["Gerund (-ing)", "Past tense", "To + infinitive", "Base form"],
        answer: "To + infinitive"
      },
      {
        id: 8,
        type: 'fill',
        text: "Translate: 'Me gustaría un café.' -> 'I would like a ______.'",
        answer: "coffee"
      },
      {
        id: 9,
        type: 'unscramble',
        text: "Unscramble the negative like:",
        parts: ["don't", "I", "pizza.", "like"],
        answer: "I don't like pizza."
      },
      {
        id: 10,
        type: 'mc',
        text: "Choose the correct sentence:",
        options: ["I would like go home.", "I would like to go home.", "I like go home.", "I wanting go home."],
        answer: "I would like to go home."
      }
    ];

    let currentQuestionIndex = 0;
    let score = 0;
    let selectedMCOption = null;
    let unscrambleOrder = [];

    const gameArea = document.getElementById('game-area');
    const resultArea = document.getElementById('result-area');
    const inputArea = document.getElementById('input-area');
    const feedbackArea = document.getElementById('feedback-area');
    const feedbackContent = document.getElementById('feedback-content');
    const feedbackStatus = document.getElementById('feedback-status');
    const feedbackMessage = document.getElementById('feedback-message');
    const feedbackIcon = document.getElementById('feedback-icon');
    const checkBtn = document.getElementById('check-btn');
    const nextBtn = document.getElementById('next-btn');
    const progressBar = document.getElementById('progress-bar');
    const progressText = document.getElementById('progress-text');
    const percentageText = document.getElementById('percentage-text');
    const qNumLabel = document.getElementById('question-number');
    const qTextLabel = document.getElementById('question-text');

    function init() {
      loadQuestion();
    }

    function loadQuestion() {
      const q = questions[currentQuestionIndex];

      // Reset UI
      inputArea.innerHTML = '';
      feedbackArea.classList.add('hidden', 'opacity-0');
      checkBtn.classList.remove('hidden');
      checkBtn.disabled = true;
      nextBtn.classList.add('hidden');
      selectedMCOption = null;
      unscrambleOrder = [];

      // Update Progress
      const progress = ((currentQuestionIndex) / questions.length) * 100;
      progressBar.style.width = `${progress}%`;
      progressText.innerText = `Question ${currentQuestionIndex + 1} of ${questions.length}`;
      percentageText.innerText = `${Math.round(progress)}%`;
      qNumLabel.innerText = `Question #${currentQuestionIndex + 1}`;
      qTextLabel.innerText = q.text;

      // Render Input Type
      if (q.type === 'mc') {
        const grid = document.createElement('div');
        grid.className = 'grid grid-cols-1 md:grid-cols-2 gap-3';
        q.options.forEach(opt => {
          const btn = document.createElement('button');
          btn.className = 'option-btn text-left p-4 rounded-xl border-2 border-slate-100 hover:border-blue-200 hover:bg-blue-50 font-medium transition-all';
          btn.innerText = opt;
          btn.onclick = () => selectMCOption(btn, opt);
          grid.appendChild(btn);
        });
        inputArea.appendChild(grid);
      }
      else if (q.type === 'fill') {
        const input = document.createElement('input');
        input.type = 'text';
        input.placeholder = 'Type your answer here...';
        input.className = 'w-full p-4 text-lg rounded-2xl border-2 border-slate-100 focus:border-primary focus:ring-4 focus:ring-blue-100 outline-none transition-all';
        input.oninput = (e) => {
          checkBtn.disabled = e.target.value.trim() === '';
        };
        inputArea.appendChild(input);
      }
      else if (q.type === 'unscramble') {
        const dropZone = document.createElement('div');
        dropZone.className = 'drop-zone flex flex-wrap gap-2 p-4 bg-slate-50 border-2 border-dashed border-slate-200 rounded-2xl mb-4';
        dropZone.id = 'drop-zone';

        const wordBank = document.createElement('div');
        wordBank.className = 'flex flex-wrap gap-2';
        wordBank.id = 'word-bank';

        // Shuffle parts for word bank
        const shuffledParts = [...q.parts].sort(() => Math.random() - 0.5);

        shuffledParts.forEach(word => {
          const chip = createWordChip(word);
          wordBank.appendChild(chip);
        });

        inputArea.appendChild(dropZone);
        inputArea.appendChild(wordBank);
      }
    }

    function createWordChip(word) {
      const chip = document.createElement('span');
      chip.className = 'word-chip inline-block px-4 py-2 bg-white border border-slate-200 rounded-xl font-medium shadow-sm hover:border-primary hover:text-primary';
      chip.innerText = word;
      chip.onclick = () => moveWord(chip);
      return chip;
    }

    function moveWord(chip) {
      const dropZone = document.getElementById('drop-zone');
      const wordBank = document.getElementById('word-bank');

      if (chip.parentElement.id === 'word-bank') {
        dropZone.appendChild(chip);
      } else {
        wordBank.appendChild(chip);
      }

      const wordsInDropZone = dropZone.querySelectorAll('.word-chip');
      checkBtn.disabled = wordsInDropZone.length === 0;
    }

    function selectMCOption(btn, opt) {
      const btns = inputArea.querySelectorAll('.option-btn');
      btns.forEach(b => {
        b.classList.remove('border-primary', 'bg-blue-50', 'ring-4', 'ring-blue-100');
        b.classList.add('border-slate-100');
      });
      btn.classList.remove('border-slate-100');
      btn.classList.add('border-primary', 'bg-blue-50', 'ring-4', 'ring-blue-100');
      selectedMCOption = opt;
      checkBtn.disabled = false;
    }

    function checkAnswer() {
      const q = questions[currentQuestionIndex];
      let userAnswer = '';
      let isCorrect = false;

      if (q.type === 'mc') {
        userAnswer = selectedMCOption;
        isCorrect = userAnswer === q.answer;
      } else if (q.type === 'fill') {
        userAnswer = inputArea.querySelector('input').value.trim();
        isCorrect = userAnswer.toLowerCase() === q.answer.toLowerCase();
      } else if (q.type === 'unscramble') {
        const chips = Array.from(document.getElementById('drop-zone').querySelectorAll('.word-chip'));
        userAnswer = chips.map(c => c.innerText).join(' ');
        isCorrect = userAnswer === q.answer;
      }

      if (isCorrect) score++;

      showFeedback(isCorrect, q.answer);
    }

    function showFeedback(isCorrect, correctAnswer) {
      feedbackArea.classList.remove('hidden');
      setTimeout(() => feedbackArea.classList.remove('opacity-0'), 10);

      if (isCorrect) {
        feedbackContent.className = 'p-4 rounded-2xl flex items-start gap-4 bg-emerald-50 text-emerald-800 border border-emerald-100';
        feedbackStatus.innerText = 'Excellent!';
        feedbackMessage.innerText = 'You got it right.';
        feedbackIcon.innerHTML = `<svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"></path></svg>`;
      } else {
        feedbackContent.className = 'p-4 rounded-2xl flex items-start gap-4 bg-red-50 text-red-800 border border-red-100';
        feedbackStatus.innerText = 'Not quite...';
        feedbackMessage.innerHTML = `Correct answer: <span class="font-bold underline">${correctAnswer}</span>`;
        feedbackIcon.innerHTML = `<svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd"></path></svg>`;
      }

      checkBtn.classList.add('hidden');
      nextBtn.classList.remove('hidden');

      // Disable inputs
      const inputs = inputArea.querySelectorAll('button, input, span');
      inputs.forEach(i => i.style.pointerEvents = 'none');
    }

    function nextQuestion() {
      currentQuestionIndex++;
      if (currentQuestionIndex < questions.length) {
        loadQuestion();
      } else {
        showResults();
      }
    }

    function showResults() {
      gameArea.classList.add('hidden');
      resultArea.classList.remove('hidden');

      // Final progress bar
      progressBar.style.width = '100%';
      progressText.innerText = `Challenge Complete!`;
      percentageText.innerText = `100%`;

      const percentage = (score / questions.length) * 100;
      document.getElementById('final-score').innerText = `${percentage}%`;
      document.getElementById('score-fraction').innerText = `${score} out of ${questions.length} correct`;
    }

    function restartGame() {
      currentQuestionIndex = 0;
      score = 0;
      resultArea.classList.add('hidden');
      gameArea.classList.remove('hidden');
      loadQuestion();
    }

    window.onload = init;
  </script>
</body>

</html>
