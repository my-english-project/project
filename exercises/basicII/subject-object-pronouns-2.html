<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UTS | Subject & Object Pronouns</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Plus+Jakarta+Sans:wght@400;500;700&display=swap"
    rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            uts: {
              blue: '#1A237E',
              green: '#00843D',
              grey: '#58595B',
              silver: '#A7A9AC',
              light: '#F8FAFC'
            },
            correct: {
              bg: '#DCFCE7',
              text: '#166534',
              border: '#22C55E'
            },
            error: {
              bg: '#FEE2E2',
              text: '#991B1B',
              border: '#EF4444'
            }
          },
          fontFamily: {
            display: ['Outfit', 'sans-serif'],
            body: ['Plus Jakarta Sans', 'sans-serif'],
          },
          animation: {
            'fade-in': 'fadeIn 0.5s ease-out forwards',
            'slide-up': 'slideUp 0.4s ease-out forwards',
            'bounce-subtle': 'bounceSubtle 2s infinite',
          },
          keyframes: {
            fadeIn: {
              '0%': { opacity: '0' },
              '100%': { opacity: '1' },
            },
            slideUp: {
              '0%': { transform: 'translateY(20px)', opacity: '0' },
              '100%': { transform: 'translateY(0)', opacity: '1' },
            },
            bounceSubtle: {
              '0%, 100%': { transform: 'translateY(0)' },
              '50%': { transform: 'translateY(-5px)' },
            }
          }
        }
      }
    }
  </script>
  <style>
    body {
      background-color: #f0f2f5;
      font-family: 'Plus Jakarta Sans', sans-serif;
      -webkit-tap-highlight-color: transparent;
    }

    .glass-card {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .option-btn {
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .option-btn:active {
      transform: scale(0.98);
    }

    .progress-glow {
      box-shadow: 0 0 15px rgba(0, 132, 61, 0.3);
    }

    .custom-scrollbar::-webkit-scrollbar {
      width: 6px;
    }

    .custom-scrollbar::-webkit-scrollbar-track {
      background: #f1f1f1;
    }

    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: #A7A9AC;
      border-radius: 10px;
    }
  </style>
</head>

<body class="min-h-screen flex flex-col text-slate-800 overflow-x-hidden">

  <!-- Header -->
  <header class="sticky top-0 z-50 bg-uts-blue text-white shadow-lg px-4 py-3 md:px-8">
    <div class="max-w-5xl mx-auto flex items-center justify-between">
      <a href="index.html" class="flex items-center gap-2 hover:opacity-80 transition-opacity group">
        <div class="bg-white/10 p-2 rounded-full group-hover:-translate-x-1 transition-transform">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="m15 18-6-6 6-6" />
          </svg>
        </div>
        <span class="hidden md:block font-medium">Back</span>
      </a>

      <div class="flex flex-col items-center">
        <h1 class="font-display font-bold text-lg md:text-xl tracking-tight">Subject & Object Pronouns</h1>
        <span class="text-[10px] uppercase tracking-[0.2em] opacity-70 font-bold">Vol. 2</span>
      </div>

      <div
        class="w-12 h-12 border-2 border-dashed border-white/40 rounded flex items-center justify-center text-[10px] text-center leading-tight">
        <img src="../../assets/images/logo-uts-2024.png" alt="UTS Logo" class="logo">
      </div>
    </div>
  </header>

  <main id="app" class="flex-grow flex items-center justify-center p-4 md:p-8">
    <!-- Game Screen -->
    <section id="game-screen" class="w-full max-w-2xl animate-fade-in">
      <!-- Progress Tracking -->
      <div class="mb-8 space-y-3">
        <div class="flex justify-between items-end">
          <span class="text-xs font-bold uppercase tracking-widest text-uts-grey" id="question-counter">Question 1 of
            10</span>
          <span class="text-xs font-bold text-uts-green" id="progress-percent">0%</span>
        </div>
        <div class="h-3 w-full bg-slate-200 rounded-full overflow-hidden">
          <div id="progress-fill" class="h-full bg-uts-green progress-glow transition-all duration-500 ease-out"
            style="width: 0%"></div>
        </div>
      </div>

      <!-- Flashcard Container -->
      <div id="question-container"
        class="glass-card rounded-3xl shadow-2xl overflow-hidden border border-slate-100 flex flex-col min-h-[400px]">
        <div class="p-8 md:p-10 flex-grow">
          <div id="question-content" class="animate-slide-up">
            <!-- Content injected by JS -->
          </div>
        </div>

        <!-- Feedback Area (Hidden initially) -->
        <div id="feedback-area" class="hidden px-8 py-6 transition-all border-t animate-fade-in">
          <!-- Feedback injected by JS -->
        </div>

        <!-- Footer Controls -->
        <div class="p-6 bg-slate-50/50 border-t border-slate-100 flex justify-center">
          <button id="action-btn" disabled
            class="w-full md:w-64 py-4 rounded-2xl bg-uts-green text-white font-bold text-lg shadow-lg shadow-green-900/20 hover:bg-green-700 disabled:bg-slate-300 disabled:shadow-none transition-all transform active:scale-95 flex items-center justify-center gap-2">
            Submit Answer
          </button>
        </div>
      </div>
    </section>

    <!-- Score Screen (Hidden initially) -->
    <section id="score-screen" class="hidden w-full max-w-lg text-center animate-slide-up">
      <div class="glass-card rounded-[2.5rem] p-10 shadow-2xl border border-white">
        <div class="mb-6 inline-flex p-4 rounded-full bg-green-50">
          <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none"
            stroke="#00843D" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14" />
            <polyline points="22 4 12 14.01 9 11.01" />
          </svg>
        </div>

        <h2 class="font-display text-4xl font-extrabold text-uts-blue mb-2">Practice Complete!</h2>
        <p class="text-uts-grey font-medium mb-10">You've mastered these pronouns. Great job!</p>

        <div class="relative w-48 h-48 mx-auto mb-10">
          <svg class="w-full h-full transform -rotate-90">
            <circle cx="96" cy="96" r="88" stroke="#f1f5f9" stroke-width="12" fill="transparent" />
            <circle id="score-circle-path" cx="96" cy="96" r="88" stroke="#00843D" stroke-width="12" fill="transparent"
              stroke-dasharray="552.92" stroke-dashoffset="552.92" class="transition-all duration-1000 ease-out" />
          </svg>
          <div class="absolute inset-0 flex flex-col items-center justify-center">
            <span id="final-score-percent" class="text-5xl font-black text-uts-blue">0%</span>
            <span class="text-xs font-bold text-uts-grey uppercase tracking-tighter">Overall Accuracy</span>
          </div>
        </div>

        <div class="bg-slate-50 rounded-2xl p-6 mb-10 border border-slate-100">
          <p id="score-text" class="text-lg font-semibold text-slate-700">Correct: 0 / 10</p>
        </div>

        <button onclick="resetGame()"
          class="w-full py-5 rounded-2xl bg-uts-blue text-white font-bold text-xl shadow-xl hover:bg-blue-900 transition-all transform active:scale-95">
          Try Again
        </button>
      </div>
    </section>
  </main>

  <script>
    const questions = [
      {
        type: 'mcq',
        question: "Choose the correct subject pronoun: ____ is my best friend.",
        options: ["He", "Him", "His", "Me"],
        correct: "He",
        explanation: "'He' is a subject pronoun used as the subject of the sentence."
      },
      {
        type: 'identify',
        question: "Identify the object pronoun in this sentence: 'Sarah called them yesterday.'",
        options: ["Sarah", "called", "them", "yesterday"],
        correct: "them",
        explanation: "'Them' is the object pronoun because it receives the action of the verb 'called'."
      },
      {
        type: 'fill',
        question: "Type the correct object pronoun for 'we': The teacher gave the books to ____.",
        correct: "us",
        explanation: "'Us' is the object form of 'we'."
      },
      {
        type: 'tf',
        question: "In the sentence 'I saw him', 'I' is a subject pronoun.",
        options: ["True", "False"],
        correct: "True",
        explanation: "'I' is the person performing the action, making it a subject pronoun."
      },
      {
        type: 'mcq',
        question: "Select the correct object pronoun: Please tell ____ the truth.",
        options: ["I", "Me", "My", "Mine"],
        correct: "Me",
        explanation: "'Me' is the object pronoun used after the verb 'tell'."
      },
      {
        type: 'fill',
        question: "Complete the sentence with the correct subject pronoun: ____ are going to the cinema tonight. (referring to a group including yourself)",
        correct: "We",
        explanation: "'We' is the first-person plural subject pronoun."
      },
      {
        type: 'identify',
        question: "Which word is a subject pronoun?",
        options: ["Her", "Us", "You", "Them"],
        correct: "You",
        explanation: "'You' can be both subject and object, but in this list, it's the only one that functions as a subject (Her/Us/Them are object forms)."
      },
      {
        type: 'mcq',
        question: "Replace the underlined word: '<u>The cat</u> is sleeping.'",
        options: ["He", "It", "She", "They"],
        correct: "It",
        explanation: "'It' is used for animals and objects in the singular."
      },
      {
        type: 'tf',
        question: "'Me' can be used as the subject of a sentence. (Example: 'Me want food.')",
        options: ["True", "False"],
        correct: "False",
        explanation: "'Me' is an object pronoun; the subject pronoun 'I' should be used instead."
      },
      {
        type: 'fill',
        question: "Type the correct pronoun: 'I like Sarah, and she likes ____ too.' (referring to yourself)",
        correct: "me",
        explanation: "'Me' is the object pronoun used after the verb 'likes'."
      }
    ];

    let currentIdx = 0;
    let score = 0;
    let selectedAnswer = null;
    let isFeedbackMode = false;

    const appEl = document.getElementById('game-screen');
    const scoreEl = document.getElementById('score-screen');
    const questionContent = document.getElementById('question-content');
    const actionBtn = document.getElementById('action-btn');
    const feedbackArea = document.getElementById('feedback-area');
    const progressFill = document.getElementById('progress-fill');
    const progressText = document.getElementById('progress-percent');
    const counterText = document.getElementById('question-counter');

    function init() {
      renderQuestion();
    }

    function renderQuestion() {
      const q = questions[currentIdx];
      isFeedbackMode = false;
      selectedAnswer = null;

      // Progress Update
      const progress = (currentIdx / questions.length) * 100;
      progressFill.style.width = `${progress}%`;
      progressText.innerText = `${Math.round(progress)}%`;
      counterText.innerText = `Question ${currentIdx + 1} of ${questions.length}`;

      feedbackArea.classList.add('hidden');
      actionBtn.disabled = true;
      actionBtn.innerText = "Submit Answer";
      actionBtn.onclick = checkAnswer;

      let html = `
                <div class="mb-6">
                    <span class="inline-block px-3 py-1 rounded-full bg-uts-blue/10 text-uts-blue text-[10px] font-bold uppercase tracking-wider mb-4">
                        ${q.type === 'tf' ? 'True or False' : q.type.toUpperCase()}
                    </span>
                    <h2 class="text-2xl md:text-3xl font-display font-bold text-slate-800 leading-tight">
                        ${q.question.replace('____', '<span class="text-uts-green border-b-2 border-uts-green/30 px-2 italic">_____</span>')}
                    </h2>
                </div>
            `;

      if (q.type === 'fill') {
        html += `
                    <div class="mt-8">
                        <input type="text" id="ans-input" 
                            class="w-full p-5 text-xl rounded-2xl border-2 border-slate-200 focus:border-uts-blue focus:outline-none transition-all placeholder:text-slate-300" 
                            placeholder="Type your answer here..."
                            oninput="handleInput(this.value)">
                    </div>
                `;
      } else {
        html += `<div class="grid grid-cols-1 md:grid-cols-2 gap-4 mt-8">`;
        q.options.forEach(opt => {
          html += `
                        <button onclick="selectOption('${opt}', this)" 
                            class="option-btn p-5 text-left rounded-2xl border-2 border-slate-200 hover:border-uts-blue hover:bg-blue-50/50 font-semibold text-lg flex items-center justify-between group">
                            <span>${opt}</span>
                            <div class="w-6 h-6 rounded-full border-2 border-slate-300 group-hover:border-uts-blue transition-colors"></div>
                        </button>
                    `;
        });
        html += `</div>`;
      }

      questionContent.innerHTML = html;
      questionContent.classList.remove('animate-slide-up');
      void questionContent.offsetWidth; // Trigger reflow
      questionContent.classList.add('animate-slide-up');
    }

    function handleInput(val) {
      selectedAnswer = val.trim();
      actionBtn.disabled = selectedAnswer.length === 0;
    }

    function selectOption(val, btn) {
      if (isFeedbackMode) return;

      selectedAnswer = val;
      actionBtn.disabled = false;

      // Visual toggle
      document.querySelectorAll('.option-btn').forEach(b => {
        b.classList.remove('border-uts-blue', 'bg-blue-50', 'ring-2', 'ring-uts-blue/20');
        b.querySelector('div').classList.remove('bg-uts-blue', 'border-uts-blue');
        b.querySelector('div').innerHTML = '';
      });

      btn.classList.add('border-uts-blue', 'bg-blue-50', 'ring-2', 'ring-uts-blue/20');
      btn.querySelector('div').classList.add('bg-uts-blue', 'border-uts-blue');
      btn.querySelector('div').innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" class="p-1"><polyline points="20 6 9 17 4 12"/></svg>';
    }

    function checkAnswer() {
      const q = questions[currentIdx];
      isFeedbackMode = true;
      const isCorrect = selectedAnswer.toLowerCase() === q.correct.toLowerCase();

      if (isCorrect) score++;

      // Highlight in options if applicable
      if (q.type !== 'fill') {
        document.querySelectorAll('.option-btn').forEach(btn => {
          const text = btn.querySelector('span').innerText;
          if (text === q.correct) {
            btn.classList.add('border-correct-border', 'bg-correct-bg');
          } else if (text === selectedAnswer && !isCorrect) {
            btn.classList.add('border-error-border', 'bg-error-bg');
          }
        });
      } else {
        const input = document.getElementById('ans-input');
        input.disabled = true;
        input.classList.add(isCorrect ? 'border-correct-border' : 'border-error-border');
        input.classList.add(isCorrect ? 'bg-correct-bg' : 'bg-error-bg');
      }

      // Show feedback
      feedbackArea.innerHTML = `
                <div class="flex items-start gap-4 p-4 rounded-xl ${isCorrect ? 'bg-correct-bg text-correct-text' : 'bg-error-bg text-error-text'}">
                    <div class="mt-1">
                        ${isCorrect ?
          '<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" viewBox="0 0 16 16"><path d="M16 8A8 8 0 1 1 0 8a8 8 0 0 1 16 0zm-3.97-3.03a.75.75 0 0 0-1.08.022L7.477 9.417 5.384 7.323a.75.75 0 0 0-1.06 1.06L6.97 11.03a.75.75 0 0 0 1.079-.02l3.992-4.99a.75.75 0 0 0-.01-1.05z"/></svg>' :
          '<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" viewBox="0 0 16 16"><path d="M16 8A8 8 0 1 1 0 8a8 8 0 0 1 16 0zM5.354 4.646a.5.5 0 1 0-.708.708L7.293 8l-2.647 2.646a.5.5 0 0 0 .708.708L8 8.707l2.646 2.647a.5.5 0 0 0 .708-.708L8.707 8l2.647-2.646a.5.5 0 0 0-.708-.708L8 7.293 5.354 4.646z"/></svg>'
        }
                    </div>
                    <div>
                        <p class="font-bold text-lg">${isCorrect ? 'Correct!' : 'Incorrect'}</p>
                        <p class="text-sm opacity-90 leading-relaxed">${q.explanation}</p>
                    </div>
                </div>
            `;
      feedbackArea.classList.remove('hidden');

      actionBtn.innerText = currentIdx < questions.length - 1 ? "Next Question" : "See Results";
      actionBtn.onclick = nextQuestion;
    }

    function nextQuestion() {
      currentIdx++;
      if (currentIdx < questions.length) {
        renderQuestion();
      } else {
        showScore();
      }
    }

    function showScore() {
      appEl.classList.add('hidden');
      scoreEl.classList.remove('hidden');

      const percent = Math.round((score / questions.length) * 100);
      document.getElementById('final-score-percent').innerText = `${percent}%`;
      document.getElementById('score-text').innerText = `You got ${score} out of ${questions.length} correct!`;

      // Progress Circle Animation
      const circle = document.getElementById('score-circle-path');
      const circumference = 2 * Math.PI * 88;
      const offset = circumference - (percent / 100) * circumference;

      setTimeout(() => {
        circle.style.strokeDashoffset = offset;
      }, 100);

      // Final progress bar fill
      progressFill.style.width = `100%`;
      progressText.innerText = `100%`;
    }

    function resetGame() {
      currentIdx = 0;
      score = 0;
      scoreEl.classList.add('hidden');
      appEl.classList.remove('hidden');

      const circle = document.getElementById('score-circle-path');
      circle.style.strokeDashoffset = 552.92;

      renderQuestion();
    }

    init();
  </script>
</body>

</html>
